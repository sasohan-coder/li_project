<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Allotment</title>
    <link rel="stylesheet" href="css/common.css">
</head>
<body>
    <div class="page">
    <h1>Book Allotment</h1>
    <p><a href="dashboard.html">Back to dashboard</a></p>
    <div class="form-card">
    <form>
        <label for="book">Book</label>
        <select id="book">
            <option>Java Basics</option>
            <option>Web Design</option>
        </select>
        <label for="student">Student Email</label>
        <input id="student" type="email" placeholder="student@example.com">
        <label for="subscription">Subscription Type</label>
        <select id="subscription">
            <option>Monthly</option>
            <option>Yearly</option>
        </select>
        <button class="btn-primary" type="submit">Allot Book</button>
    </form>
    </div>
    </div>
    <script src="js/app.js"></script>
</body>
</html>
